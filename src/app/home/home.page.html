<ion-header>
  <ion-toolbar>
    <ion-title>
      Vaci Kids
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <div class="page-title">
    <h1>Controle Vacinal Infantil</h1>
    <p>Acompanhe a vacinação das crianças.</p>
  </div>

  <ion-grid>
    <ion-row>

      <ion-col size="12" sizeMd="4">
        <ion-card class="green-card">
          <ion-card-header>
            <ion-card-title>
              👶 Crianças
            </ion-card-title>
          </ion-card-header>

          <ion-card-content>
            {{ totalChildren }}
          </ion-card-content>
        </ion-card>
      </ion-col>

      <ion-col size="12" sizeMd="4">
        <ion-card class="yellow-card">
          <ion-card-header>
            <ion-card-title>
              💉 Vacinas
            </ion-card-title>
          </ion-card-header>

          <ion-card-content>
            {{ totalVaccines }}
          </ion-card-content>
        </ion-card>
      </ion-col>

      <ion-col size="12" sizeMd="4">
        <ion-card class="orange-card">
          <ion-card-header>
            <ion-card-title>
              📢 Campanhas
            </ion-card-title>
          </ion-card-header>

          <ion-card-content>
            {{ totalCampaigns }}
          </ion-card-content>
        </ion-card>
      </ion-col>

    </ion-row>
  </ion-grid>

</ion-content>
